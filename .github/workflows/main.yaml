name: Quiz System CI/CD

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Run Static Analysis (Linter)
        run: npx eslint . || true

      - name: Run Automated Tests
        run: npm test

      - name: Docker Build Check
        run: docker build -t quiz-app .
